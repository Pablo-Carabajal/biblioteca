spring.application.name=biblioteca

spring.datasource.url=jdbc:mysql://localhost:3306/biblioteca?serverTimezone=UTC
spring.datasource.username=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#Para crear datos de pruebas en la base de datos
spring.jpa.hibernate.ddl-auto=create

# Muestra las consultas SQL en consola
spring.jpa.show-sql=true

# Formatea el SQL impreso para que sea más legible
spring.jpa.properties.hibernate.format_sql=true

# Dialecto de Hibernate para MySQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Contraseñas de spring-security

spring.security.user.name=admin
spring.security.user.password=12345

